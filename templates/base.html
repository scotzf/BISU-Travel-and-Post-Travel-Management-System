{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>{% block title %}BISU Travel Management{% endblock %}</title>
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <!-- Custom Modern CSS -->
    <link rel="stylesheet" href="{% static 'css/auth-styles.css' %}">
    
    <!-- Favicon (Optional) -->
    <link rel="icon" type="image/png" href="{% static 'images/favicon.png' %}">
    
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- Main Content -->
    <main>
        {% block content %}{% endblock %}
    </main>
    
    <!-- Messages Toast (Optional) -->
    {% if messages %}
    <div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 9999;">
        {% for message in messages %}
        <div class="toast show align-items-center text-white bg-{{ message.tags }} border-0" role="alert">
            <div class="d-flex">
                <div class="toast-body">
                    {{ message }}
                </div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
        {% endfor %}
    </div>
    {% endif %}
    
    {% block extra_js %}{% endblock %}
</body>
</html>
